<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFL2K5Tool Web</title>
  <link rel="icon" type="image/webp" href="NFL2K5_image.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
  <script defer src="main.dart.js"></script>
</head>

<body>

  <!-- ═══════════════════════════════════════════════════════
       TOP BAR
       ═══════════════════════════════════════════════════════ -->
  <header id="top-bar" class="top-bar">

    <div class="logo">
      <span class="logo-nfl">NFL</span><span class="logo-rest">2K5 Tool</span>
    </div>

    <div class="top-bar-actions">
      <button id="btn-open" class="btn btn-outlined" title="Open a gamesave file">
        <span class="material-symbols-outlined">folder_open</span>
        <span>Open File</span>
      </button>
      <button id="btn-save" class="btn btn-filled" disabled title="Save (not available in browser)">
        <span class="material-symbols-outlined">save</span>
        <span>Save</span>
      </button>
      <button id="btn-export" class="btn btn-outlined" disabled title="Export / download gamesave">
        <span class="material-symbols-outlined">download</span>
        <span>Export Save</span>
      </button>
    </div>

    <div id="file-badge" class="file-badge" hidden>
      <span id="file-badge-type" class="file-badge-type"></span>
      <span id="file-badge-name" class="file-badge-name"></span>
    </div>

    <div class="flex-spacer"></div>

    <a href="https://github.com/BAD-AL/nfl2k5tool_web" target="_blank" rel="noopener"
      class="btn btn-outlined" title="View source on GitHub">
      <span class="material-symbols-outlined">code</span>
      <span>View on GitHub</span>
    </a>

    <button id="btn-theme" class="btn btn-icon" title="Switch to Light mode">
      <span id="theme-icon" class="material-symbols-outlined">dark_mode</span>
    </button>

  </header>

  <!-- ═══════════════════════════════════════════════════════
       NAVIGATION RAIL
       ═══════════════════════════════════════════════════════ -->
  <nav id="nav-rail" class="nav-rail">

    <a id="nav-options" class="nav-item" data-section="options" title="Options">
      <span class="material-symbols-outlined nav-icon">settings</span>
      <span class="nav-label">Options</span>
    </a>

    <div class="nav-section-label">EDITORS</div>

    <a id="nav-players" class="nav-item" data-section="players" title="Player Editor">
      <span class="material-symbols-outlined nav-icon">person</span>
      <span class="nav-label">Players</span>
    </a>

    <a id="nav-schedule" class="nav-item nav-item--disabled" data-section="schedule" title="Schedule Editor">
      <span class="material-symbols-outlined nav-icon">calendar_month</span>
      <span class="nav-label">Schedule</span>
    </a>

    <a id="nav-coaches" class="nav-item" data-section="coaches" title="Coach Editor">
      <span class="material-symbols-outlined nav-icon">headset_mic</span>
      <span class="nav-label">Coaches</span>
    </a>

    <a id="nav-teamData" class="nav-item" data-section="teamData" title="Team Data Editor">
      <span class="material-symbols-outlined nav-icon">shield</span>
      <span class="nav-label">Team Data</span>
    </a>

    <a id="nav-textEditor" class="nav-item" data-section="textEditor" title="Text Editor">
      <span class="material-symbols-outlined nav-icon">edit_note</span>
      <span class="nav-label">Text Editor</span>
    </a>

    <div class="nav-spacer"></div>
    <button id="btn-rail-collapse" class="nav-collapse-toggle" title="Collapse sidebar">
      <span id="rail-collapse-icon" class="material-symbols-outlined">chevron_left</span>
    </button>

  </nav>

  <!-- ═══════════════════════════════════════════════════════
       MAIN CONTENT AREA
       ═══════════════════════════════════════════════════════ -->
  <main id="content" class="content">
    <div id="screen-options"     class="screen" hidden></div>
    <div id="screen-players"    class="screen" hidden></div>
    <div id="screen-schedule"   class="screen" hidden></div>
    <div id="screen-coaches"    class="screen" hidden></div>
    <div id="screen-teamData"   class="screen" hidden></div>
    <div id="screen-textEditor" class="screen" hidden></div>
  </main>

  <!-- ═══════════════════════════════════════════════════════
       STATUS BAR
       ═══════════════════════════════════════════════════════ -->
  <footer id="status-bar" class="status-bar">
    <div class="status-left">
      <span id="status-dot" class="status-dot"></span>
      <span id="status-text" class="status-text">No File Loaded</span>
      <span id="status-sep" class="status-sep" hidden></span>
      <span id="status-extra" class="status-text" hidden></span>
    </div>
    <div class="status-right">
      <span id="status-version" class="status-text">NFL2K5Tool Web</span>
    </div>
  </footer>

</body>
</html>
